#extensions/dns/extension.yaml
name: dns
label: "DNS Security"
description: "DNS Sinkhole"
version: "1.0"
enabled: true

entrypoint: extensions.dns.service.main:DNSSinkholePlugin

config:
  listen_host: "0.0.0.0"
  listen_port: 5353
  upstream_resolver: "1.1.1.1"

  rules_path: "./extensions/dns/rules"

  gravity:
    enabled: true
    interval_hours: 12

  telemetry:
    enabled: true

  ips:
    enabled: true

  policy:
    enabled: true
    rules_path: "./extensions/dns/rules/policy.yaml"

